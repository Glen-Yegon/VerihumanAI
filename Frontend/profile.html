  <!-- Init particles -->
  <script type="module">
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import { app } from "./firebase-config/firebase.js";

const auth = getAuth(app);
const db = getFirestore(app);

const DEFAULT_AVATAR = "./default-avatar.png";

async function getUserPhotoURL(uid) {
  if (!uid) return DEFAULT_AVATAR;

  try {
    const userRef = doc(db, "users", uid);
    const userSnap = await getDoc(userRef);

    // 1. Primary source: Firestore users/{uid}.photoURL
    if (userSnap.exists()) {
      const data = userSnap.data() || {};
      if (data.photoURL && typeof data.photoURL === "string" && data.photoURL.trim()) {
        return data.photoURL.trim();
      }
    }

    // 2. Backup source: sessionStorage
    const sessionPhoto = sessionStorage.getItem("profilePhoto");
    if (sessionPhoto && sessionPhoto.trim()) {
      return sessionPhoto.trim();
    }

    // 3. Final fallback
    return DEFAULT_AVATAR;
  } catch (error) {
    console.error("Error loading user photo:", error);

    const sessionPhoto = sessionStorage.getItem("profilePhoto");
    if (sessionPhoto && sessionPhoto.trim()) {
      return sessionPhoto.trim();
    }

    return DEFAULT_AVATAR;
  }
}

function applyPhotoToImg(imgEl, photoURL) {
  if (!imgEl) return;
  imgEl.src = photoURL || DEFAULT_AVATAR;
  imgEl.alt = "User Profile Photo";
}

function applyPhotoToBackground(el, photoURL) {
  if (!el) return;
  el.style.backgroundImage = `url('${photoURL || DEFAULT_AVATAR}')`;
  el.style.backgroundSize = "cover";
  el.style.backgroundPosition = "center";
  el.style.borderRadius = "50%";
}

// Example usage on auth state change
onAuthStateChanged(auth, async (user) => {
  const profilePhotoImg = document.getElementById("profile-photo");
  const userAvatar = document.getElementById("user-avatar");
  const modalAvatar = document.getElementById("modal-avatar");

  if (!user) {
    applyPhotoToImg(profilePhotoImg, DEFAULT_AVATAR);
    applyPhotoToBackground(userAvatar, DEFAULT_AVATAR);
    applyPhotoToBackground(modalAvatar, DEFAULT_AVATAR);
    return;
  }

  const photoURL = await getUserPhotoURL(user.uid);

  applyPhotoToImg(profilePhotoImg, photoURL);
  applyPhotoToBackground(userAvatar, photoURL);
  applyPhotoToBackground(modalAvatar, photoURL);
});
</script>

<script type="module">
import { app } from "./firebase-config/firebase.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

// Handle logout button click
document.getElementById("logout-btn").addEventListener("click", () => {
    signOut(auth).then(() => {
        // Clear stored session data
        sessionStorage.clear();
        
        // Redirect to login page
        window.location.href = "login.html";
    }).catch((error) => {
        console.error("Error signing out:", error);
    });
});
</script>
